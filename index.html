<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>排出枚数計算表</title>
    <style>
        /* 全体のスタイル */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f5f5f7;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        .app-container {
            width: 100%;
            height: 100dvh; 
            max-width: 500px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 16px 16px 24px 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            color: #333333;
            margin: 0 0 16px 0;
            padding-bottom: 8px;
            border-bottom: 3px solid #007AFF;
        }

        /* スクロール可能なメインエリア */
        .main-content {
            flex-grow: 1;
            overflow-y: auto; /* 履歴が増えたらスクロール可能にする */
            padding-bottom: 16px;
        }

        .inputs-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #555555;
            margin-bottom: 6px;
        }

        input[type="number"], select {
            width: 100%;
            height: 56px;
            font-size: 22px;
            border: 2px solid #cccccc;
            border-radius: 12px;
            box-sizing: border-box;
            background-color: #fafafa;
            color: #333333;
            text-align: center;
            text-align-last: center;
        }

        input[type="number"]:focus, select:focus {
            outline: none;
            border-color: #007AFF;
            background-color: #ffffff;
        }

        .reset-btn {
            background-color: transparent;
            border: none;
            color: #007AFF;
            font-size: 14px;
            margin-top: 8px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
        }

        /* 結果表示エリア */
        .result-box {
            background-color: #eef5ff;
            border: 2px solid #cce0ff;
            border-radius: 16px;
            padding: 20px 16px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.05);
            margin-bottom: 20px;
        }

        .result-label {
            font-size: 16px;
            color: #0056b3;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .result-value {
            font-size: 42px;
            font-weight: bold;
            color: #007AFF;
            word-break: break-all;
            line-height: 1.1;
        }

        /* ボタン類のスタイル */
        .btn {
            width: 100%;
            height: 54px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-save {
            background-color: #007AFF;
            color: #ffffff;
            margin-bottom: 24px;
        }

        /* 履歴表示エリア */
        .history-section {
            border-top: 1px dashed #cccccc;
            padding-top: 16px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-title {
            font-size: 16px;
            font-weight: bold;
            color: #555555;
        }

        .btn-clear {
            background-color: transparent;
            border: none;
            color: #FF3B30;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            padding: 4px 8px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            background-color: #f8f9fa;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            color: #333333;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-time {
            font-size: 11px;
            color: #8e8e93;
        }

        .history-formula {
            color: #666666;
        }

        .history-result {
            font-size: 18px;
            font-weight: bold;
            color: #007AFF;
            text-align: right;
            margin-top: -18px; /* 式と綺麗に並べるための微調整 */
        }

        .no-history {
            text-align: center;
            color: #8e8e93;
            font-size: 14px;
            padding: 16px 0;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>排出枚数計算表</h1>

        <div class="main-content">
            
            <div class="inputs-wrapper">
                <div class="input-group">
                    <label for="discharge-qty">生産バール数／(日)</label>
                    <input type="number" id="discharge-qty" placeholder="0" oninput="calculate()">
                </div>

                <div class="input-group">
                    <label>製品W数</label>
                    <select id="w-select" onchange="handleWChange()">
                        <option value="20">20</option>
                        <option value="30">30</option>
                        <option value="50">50</option>
                        <option value="80">80</option>
                        <option value="100">100</option>
                        <option value="custom">＋ 直接入力する...</option>
                    </select>
                    <input type="number" id="w-input" placeholder="任意の数字を入力" oninput="calculate()" style="display: none;">
                    <button id="w-reset" class="reset-btn" onclick="resetWSelect()" style="display: none;">▼ プルダウンに戻す</button>
                </div>

                <div class="input-group">
                    <label for="cut-count">カット丁数</label>
                    <select id="cut-count" onchange="calculate()" oninput="calculate()">
                        <option value="3">3</option>
                        <option value="7">7</option>
                    </select>
                </div>
            </div>

            <div class="result-box">
                <div class="result-label">計算結果</div>
                <div class="result-value" id="result-display">0</div>
            </div>

            <button class="btn btn-save" onclick="saveToHistory()">この結果を履歴に保存</button>

            <div class="history-section">
                <div class="history-header">
                    <span class="history-title">計算履歴</span>
                    <button class="btn-clear" onclick="clearHistory()">履歴をクリア</button>
                </div>
                <div id="history-list" class="history-list">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // W数の制御
        function handleWChange() {
            const select = document.getElementById('w-select');
            const input = document.getElementById('w-input');
            const resetBtn = document.getElementById('w-reset');

            if (select.value === 'custom') {
                select.style.display = 'none';
                input.style.display = 'block';
                resetBtn.style.display = 'block';
                input.value = '';
                input.focus();
            }
            calculate();
        }

        function resetWSelect() {
            const select = document.getElementById('w-select');
            const input = document.getElementById('w-input');
            const resetBtn = document.getElementById('w-reset');

            select.style.display = 'block';
            input.style.display = 'none';
            resetBtn.style.display = 'none';
            select.value = '20';
            calculate();
        }

        // 現在の値を取得する共通関数
        function getCurrentValues() {
            const dischargeQty = Number(document.getElementById('discharge-qty').value) || 0;
            const cutCount = Number(document.getElementById('cut-count').value) || 0;
            
            let wNumber = 0;
            const select = document.getElementById('w-select');
            if (select.style.display === 'none') {
                wNumber = Number(document.getElementById('w-input').value) || 0;
            } else {
                wNumber = Number(select.value) || 0;
            }

            const total = dischargeQty * wNumber * cutCount;
            return { dischargeQty, wNumber, cutCount, total };
        }

        // リアルタイム計算
        function calculate() {
            const { total } = getCurrentValues();
            document.getElementById('result-display').textContent = total.toLocaleString();
        }

        // 履歴を保存する関数
        function saveToHistory() {
            const { dischargeQty, wNumber, cutCount, total } = getCurrentValues();
            
            // 全てが0の場合は保存しない
            if (dischargeQty === 0 && wNumber === 0 && cutCount === 0) return;

            // 現在の時刻を取得 (例: 14:35)
            const now = new Date();
            const timeString = `${now.getMonth() + 1}/${now.getDate()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            // 保存用データオブジェクト
            const newItem = {
                time: timeString,
                qty: dischargeQty.toLocaleString(),
                w: wNumber.toLocaleString(),
                cut: cutCount,
                result: total.toLocaleString()
            };

            // 既存の履歴をローカルストレージから取得
            let history = JSON.parse(localStorage.getItem('loss_calc_history')) || [];
            
            // 新しい履歴を先頭に追加（新しい順に並べるため）
            history.unshift(newItem);

            // ローカルストレージに保存
            localStorage.setItem('loss_calc_history', JSON.stringify(history));

            // 画面の履歴表示を更新
            renderHistory();
        }

        // 履歴を画面に描画する関数
        function renderHistory() {
            const historyList = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('loss_calc_history')) || [];

            if (history.length === 0) {
                historyList.innerHTML = '<div class="no-history">履歴はありません</div>';
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <span class="history-time">${item.time}</span>
                    <span class="history-formula">${item.qty} × ${item.w}W × ${item.cut}カット</span>
                    <div class="history-result">${item.result}</div>
                </div>
            `).join('');
        }

        // 履歴をすべて削除する関数
        function clearHistory() {
            if (confirm('すべての履歴を削除してもよろしいですか？')) {
                localStorage.removeItem('loss_calc_history');
                renderHistory();
            }
        }

        // 起動時の処理
        window.onload = function() {
            calculate();
            renderHistory(); // 保存されている履歴を読み込む
        };
    </script>

</body>
</html>
